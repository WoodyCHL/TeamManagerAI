<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>title</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 420px;
    margin: 60px auto;
    background: #eef3f7;
    background-image:
      linear-gradient(rgba(14, 36, 56, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14, 36, 56, 0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    background-attachment: fixed;
    color: #0e2438;
    padding: 24px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .step-label {
    font-size: 12px;
    color: #8a99a8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }

  .card {
    background: #fff;
    border: 1px solid #d7e1e9;
    border-radius: 8px;
    padding: 28px;
    box-shadow: 0 2px 10px rgba(14, 36, 56, 0.06);
  }

  .notice {
    background: #fff6ee;
    border: 1px solid #ffd9bd;
    border-left: 4px solid #ff7a3d;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    color: #8a4318;
    margin-bottom: 20px;
  }

  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 18px;
    font-size: 13px;
    color: #4a5f74;
    cursor: pointer;
    line-height: 1.4;
  }

  .checkbox-row input {
    width: auto;
    margin-top: 2px;
    accent-color: #ff7a3d;
  }

  .switch-link {
    margin-top: 20px;
    font-size: 13px;
    color: #4a5f74;
    text-align: center;
  }

  .switch-link a {
    color: #ff7a3d;
    font-weight: bold;
    text-decoration: none;
  }

  .switch-link a:hover {
    text-decoration: underline;
  }

  label {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #6b7f92;
  }

  label:first-of-type {
    margin-top: 0;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    border: 1px solid #d7e1e9;
    border-radius: 6px;
    background: #f8fafb;
    font-size: 14px;
    color: #0e2438;
    box-sizing: border-box;
    transition: border-color 0.15s, background 0.15s;
  }

  input:focus {
    outline: none;
    border-color: #ff7a3d;
    background: #fff;
  }

  button.submit {
    margin-top: 16px;
    padding: 8px 16px;
    background: #ff7a3d;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }

  button.submit:disabled {
    opacity: 0.6;
    cursor: default;
  }

  #error {
    color: #c23b3b;
    margin-top: 10px;
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>title</h1>
<div class="step-label">Step 1 of 2 — Team login</div>

<div class="card">

<div id="joinForm">
  <label for="joinTeamName">Team name</label>
  <input id="joinTeamName">

  <label for="joinPassword">Team password</label>
  <input id="joinPassword" type="password">

  <button class="submit" id="joinBtn" onclick="signInTeam()">Continue</button>

  <div class="switch-link">New team? <a href="#" onclick="showForm('create'); return false;">Create team now</a></div>
</div>

<div id="createForm" style="display:none;">
  <div class="notice">
    Only the team lead should create a new team. If you're joining an existing team, use "Sign in" instead. Team names must be unique — pick something specific to your team.
  </div>

  <label for="teamName">Team name</label>
  <input id="teamName">

  <label for="teamNumber">Team number</label>
  <input id="teamNumber">

  <label for="teamPassword">Set a team password</label>
  <input id="teamPassword" type="password">

  <label class="checkbox-row">
    <input type="checkbox" id="confirmLead">
    I confirm I am the team lead setting up this team
  </label>

  <button class="submit" id="createBtn" onclick="createTeam()">Create team</button>

  <div class="switch-link">Already have a team? <a href="#" onclick="showForm('join'); return false;">Sign in</a></div>
</div>

<div id="error"></div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, where, getDocs, addDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBeEGjkfjNGK0ftzvxLhqc4oZ3ZT35_5vc",
    authDomain: "yr10digital.firebaseapp.com",
    projectId: "yr10digital",
    storageBucket: "yr10digital.firebasestorage.app",
    messagingSenderId: "485437103519",
    appId: "1:485437103519:web:f1174f549f5a2f811df1aa"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const teamsRef = collection(db, "teams");

  window.showForm = function(which) {
    document.getElementById('createForm').style.display = which === 'create' ? 'block' : 'none';
    document.getElementById('joinForm').style.display = which === 'join' ? 'block' : 'none';
    document.getElementById('error').textContent = '';
  };

  function showError(msg) {
    document.getElementById('error').textContent = msg;
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : label;
  }

  window.createTeam = async function() {
    const name = document.getElementById('teamName').value.trim();
    const number = document.getElementById('teamNumber').value.trim();
    const password = document.getElementById('teamPassword').value;
    const confirmed = document.getElementById('confirmLead').checked;

    if (!name || !number || !password) {
      showError('Fill in all fields.');
      return;
    }

    if (!confirmed) {
      showError('Please confirm you are the team lead before creating a team.');
      return;
    }

    setLoading('createBtn', true, 'Create team');
    try {
      // team names must be unique (case-insensitive check)
      const existing = await getDocs(query(teamsRef, where('nameLower', '==', name.toLowerCase())));
      if (!existing.empty) {
        showError('That team name is already taken — pick something more specific.');
        return;
      }

      const docRef = await addDoc(teamsRef, {
        name,
        nameLower: name.toLowerCase(),
        number,
        password,
        members: [],
        tasks: [],
        notes: []
      });

      window.location.href = `login-member.html?team=${encodeURIComponent(number)}`;

    } catch (err) {
      console.error(err);
      showError('Something went wrong: ' + err.message);
    } finally {
      setLoading('createBtn', false, 'Create team');
    }
  };

  window.signInTeam = async function() {
    const name = document.getElementById('joinTeamName').value.trim();
    const password = document.getElementById('joinPassword').value;

    if (!name || !password) {
      showError('Fill in all fields.');
      return;
    }

    setLoading('joinBtn', true, 'Continue');
    try {
      const found = await getDocs(query(teamsRef, where('nameLower', '==', name.toLowerCase())));
      if (found.empty) {
        showError('Team not found.');
        return;
      }

      const teamDoc = found.docs[0];
      const teamData = teamDoc.data();

      if (teamData.password !== password) {
        showError('Incorrect password.');
        return;
      }

      window.location.href = `login-member.html?team=${encodeURIComponent(teamData.number)}`;

    } catch (err) {
      console.error(err);
      showError('Something went wrong: ' + err.message);
    } finally {
      setLoading('joinBtn', false, 'Continue');
    }
  };
</script>

</body>
</html>
